<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>DeepFake Detector | Dashboard</title>
    <link rel="stylesheet" href="../static/css/style.css">
    <link href="https://fonts.googleapis.com/css2?family=Roboto:wght@300;400;500;700&display=swap" rel="stylesheet">
    <script src="https://unpkg.com/lucide@latest"></script>
</head>
<body class="dark-theme">

    <main class="main-content">
            <header class="main-header">
                <div class="header-titles">
                    <h1>Deepfake Detection</h1>
                </div>

            </header>

            <div class="dashboard-grid">
                <div class="card upload-card">
                    <div class="upload-dropzone" id="dropzone">
                        <i data-lucide="upload-cloud" class="upload-icon"></i>
                        <h3>Drop image here</h3>
                        <input type="file" id="imageInput" accept="image/*" hidden>
                        <label for="imageInput" class="browse-btn">Browse Files</label>
                    </div>
                    <div id="previewArea" class="hidden">
                        <img id="imagePreview" src="" class="preview-img">
                        <p id="analyzingText" class="hidden"><i data-lucide="loader-2" class="spin"></i> Analyzing Pixels...</p>
                    </div>
                </div>

                <div class="card result-card" id="resultCard">
                    <div class="result-header">
                        <i data-lucide="activity"></i>
                        <h2>Detection Score</h2>
                    </div>
                    <div class="result-display">
                        <div class="score-circle">
                            <span id="scoreVal">0%</span>
                        </div>
                        <div class="status-info">
                            <h3 id="statusLabel">Waiting...</h3>
                            <p id="statusDesc">Upload an image to start.</p>
                        </div>
                    </div>
                    
                    <div class="conf-section">
                        <div class="bar-container">
                            <div class="bar-fill" id="barFill"></div>
                        </div>
                        <div class="bar-labels"><span>Real</span><span>Fake</span></div>
                    </div>

                    <div id="breakdown" class="hidden">
                        <h4>Analysis Breakdown</h4>
                        <div id="breakdownItems"></div>
                    </div>
                </div>
            </div>
        </main>
    </div>
    <script src="../static/js/script.js"></script>
    <script>lucide.createIcons();</script>
</body>
</html>
